services:
  ollama:
    env_file:
      - ../.env.local
    build:
      context: ./ollama
      args:
        OLLAMA_IMAGE: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: jinjubot-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    gpus: all

  gateway:
    env_file:
      - ../.env.local
    build:
      context: ./gateway
    container_name: jinjubot-gateway
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      GATEWAY_PORT: 8080
      OLLAMA_BASE_URL: http://ollama:11434

volumes:
  ollama-data:
